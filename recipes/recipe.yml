---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: silverblue
description: This is my personal OS image base on Ublue Fedora Silverblue

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: akmods
    base: main
    install:
      - xone
      - xpadneo
    nvidia-driver: nvidia-open
  
  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    remove:
      packages:
        - gnome-software
        - firefox
        - firefox-langpacks
        - transmission-daemon
        - gnome-initial-setup
        - gnome-tour
        - gnome-classic-session
        - gnome-user-docs
        - gnome-remote-desktop
    install:
      packages:
        - neovim
        - starship
        - chromium
        - bat
        - git
        - lsd
        - zsh
        - sshfs
        - signal-desktop
        - qemu-kvm
        - libvirt
        - libvirt-client
        - libvirt-daemon
        - libvirt-daemon-driver-qemu
        - libvirt-daemon-config-network
        - virt-install
        - virt-manager
        - kitty
        - steam
        - mangohud
        - mullvad-vpn
        - fastfetch
  
  - type: default-flatpaks
    configurations:
    - scope: user
      repo:
        title: Flathub (user)
    - scope: system
      notify: false 
      repo:
        title: Flathub (system)
      install: 
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.Characters
          - org.gnome.Contacts
          - org.gnome.Firmware
          - org.gnome.Logs
          - org.gnome.Loupe
          - org.gnome.NautilusPreviewer
          - org.gnome.Papers
          - org.gnome.TextEditor
          - org.gnome.Weather
          - org.gnome.baobab
          - org.gnome.clocks
          - org.gnome.font-viewer
          - io.missioncenter.MissionCenter
          - com.mattjakeman.ExtensionManager
          - com.saivert.pwvucontrol
          - com.github.tchx84.Flatseal
          - org.libreoffice.LibreOffice
          - org.mozilla.thunderbird
          - org.gnucash.GnuCash
          - com.github.IsmaelMartinez.teams_for_linux
          - com.rtosta.zapzap
          - com.vscodium.codium
          - com.vysp3r.ProtonPlus
          - dev.vencord.Vesktop
          - io.github.Foldex.AdwSteamGtk
          - org.jellyfin.JellyfinDesktop
          - info.mumble.Mumble
          - com.heroicgameslauncher.hgl
          - io.github.celluloid_player.Celluloid
          - org.remmina.Remmina
          - page.tesk.Refine
          - com.vscodium.codium
          - io.github.kolunmi.Bazaar

  - type: gnome-extensions
    install:
      - AppIndicator and KStatusNotifierItem Support
      - Just Perfection
      - User Themes
      - Dash to Dock

  - type: signing
